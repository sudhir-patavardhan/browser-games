<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">

<title>Last 16 — World Cup 2026 Arcade Football</title>
<style>
  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; user-select:none; }
  html,body{
    margin:0; padding:0; width:100%; height:100%; overflow:hidden;
    background:#04140a; color:#f2f2f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    touch-action:none;
  }
  body{
    background: radial-gradient(circle at 30% 20%, #123a22, #04140a 65%);
  }
  .screen{
    position:fixed; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; padding:16px; overflow-y:auto;
  }
  .screen.hidden{ display:none; }
  .title{
    font-size: clamp(30px, 9vw, 56px); font-weight:900; margin:0; letter-spacing:2px; text-align:center;
    background: linear-gradient(90deg,#2bff88,#ffd93d,#ff5470,#21c7ff,#2bff88);
    background-size:300% 100%; -webkit-background-clip:text; background-clip:text; color:transparent;
    animation: shift 6s linear infinite;
  }
  @keyframes shift{ to{ background-position:300% 0; } }
  .subtitle{ opacity:0.75; margin:6px 0 0; font-size:14px; text-align:center; }
  .blink{ font-size:13px; font-weight:700; margin-top:22px; animation: blinkA 1.2s ease-in-out infinite; }
  @keyframes blinkA{ 50%{ opacity:0.2; } }
  .panel{
    background: rgba(255,255,255,0.06); border:1px solid rgba(255,255,255,0.15);
    border-radius:16px; backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px);
  }
  .btn{
    background: linear-gradient(90deg,#21c7ff,#2bff88);
    border:none; color:#04140a; font-weight:800; letter-spacing:1px;
    padding:14px 30px; border-radius:26px; font-size:15px; cursor:pointer; margin:8px;
  }
  .btn:active{ transform:scale(0.96); }
  .btn.secondary{ background: rgba(255,255,255,0.1); color:#fff; border:1px solid rgba(255,255,255,0.25); }
  .mode-row{ display:flex; flex-wrap:wrap; justify-content:center; margin-top:20px; }
  .card-grid{
    display:grid; grid-template-columns: repeat(auto-fill, minmax(140px,1fr));
    gap:10px; width:100%; max-width:920px; padding:10px;
  }
  .nation-card, .player-card{
    padding:12px; text-align:center; cursor:pointer; transition: transform 0.12s ease;
    border:2px solid transparent;
  }
  .nation-card:active, .player-card:active{ transform:scale(0.95); }
  .nation-card.disabled{ opacity:0.3; pointer-events:none; }
  .kit-swatch{ width:36px; height:36px; border-radius:50%; margin:0 auto 8px; border:2px solid rgba(255,255,255,0.5); }
  .nation-card .cname{ font-weight:800; font-size:13px; letter-spacing:0.5px; }
  .player-card .pname{ font-weight:800; font-size:14px; margin:6px 0 2px; }
  .player-card .ppos{ font-size:11px; opacity:0.6; margin-bottom:8px; }
  .statbar{ display:flex; align-items:center; gap:6px; font-size:10px; margin:3px 0; }
  .statbar .lbl{ width:22px; text-align:left; opacity:0.7; font-weight:700; }
  .statbar .track{ flex:1; height:5px; border-radius:3px; background:rgba(255,255,255,0.12); overflow:hidden; }
  .statbar .fill{ height:100%; border-radius:3px; }
  .statbar .val{ width:20px; text-align:right; opacity:0.8; }
  #screen-match{ padding:0; }
  #hud{
    position:absolute; top:0; left:0; right:0; z-index:5;
    display:flex; align-items:center; gap:6px; padding:6px 8px; flex-wrap:nowrap;
  }
  #hud .mini{ padding:5px 9px; font-size:12px; font-weight:700; white-space:nowrap; }
  #hud .mini .lbl{ font-size:8px; opacity:0.6; display:block; letter-spacing:1px; }
  #scoreBox{ font-size:15px; }
  #staminaWrap{ width:70px; }
  #staminaTrack{ height:6px; border-radius:3px; background:rgba(255,255,255,0.15); overflow:hidden; margin-top:3px; }
  #staminaFill{ height:100%; background:linear-gradient(90deg,#2bff88,#ffd93d); width:100%; }
  #radarCanvas{ display:block; width:110px; height:24px; }
  .iconBtn{
    background: rgba(255,255,255,0.08); border:1px solid rgba(255,255,255,0.2); color:#fff;
    border-radius:10px; width:34px; height:34px; font-size:14px; cursor:pointer; margin-left:auto;
    display:flex; align-items:center; justify-content:center; flex-shrink:0;
  }
  #pitchWrap{
    position:absolute; inset:0; overflow:hidden;
  }
  #pitchCanvas{ display:block; width:100%; height:100%; }
  #bannerLayer{
    position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    pointer-events:none; z-index:6;
  }
  .banner{
    font-size: clamp(20px,6vw,36px); font-weight:900; letter-spacing:2px; text-align:center;
    background: linear-gradient(90deg,#ffd93d,#ff5470,#21c7ff);
    -webkit-background-clip:text; background-clip:text; color:transparent;
    text-shadow:0 0 30px rgba(255,255,255,0.3);
    animation: bannerPop 0.4s ease-out;
  }
  @keyframes bannerPop{ from{ transform:scale(0.5); opacity:0; } to{ transform:scale(1); opacity:1; } }
  #shotMeterWrap{
    position:absolute; bottom:64px; left:50%; transform:translateX(-50%);
    width:140px; height:12px; border-radius:6px; background:rgba(0,0,0,0.4);
    border:1px solid rgba(255,255,255,0.3); overflow:hidden; z-index:5;
  }
  #shotMeterWrap.hidden{ display:none; }
  #shotMeter{ height:100%; width:0%; background:linear-gradient(90deg,#2bff88,#ffd93d,#ff5470); }
  #touchControls{
    position:absolute; inset:0; z-index:7; pointer-events:none;
  }
  #joyZone{
    position:absolute; left:0; bottom:0; width:46%; height:56%; pointer-events:auto;
  }
  #joyBase{
    position:absolute; width:96px; height:96px; border-radius:50%;
    background:rgba(255,255,255,0.08); border:2px solid rgba(255,255,255,0.25);
    display:none;
  }
  #joyStick{
    position:absolute; width:44px; height:44px; border-radius:50%;
    background:rgba(255,255,255,0.35); border:2px solid rgba(255,255,255,0.6);
  }
  #actionButtons{
    position:absolute; right:12px; bottom:10px; width:52%; height:56%; pointer-events:auto;
  }
  .abtn{
    position:absolute; width:64px; height:64px; border-radius:50%;
    background:rgba(255,255,255,0.12); border:2px solid rgba(255,255,255,0.35); color:#fff;
    font-size:12px; font-weight:800; display:flex; align-items:center; justify-content:center;

  }

  .overlay{
    position:fixed; inset:0; z-index:20; display:flex; flex-direction:column;

    background:rgba(4,20,10,0.82); backdrop-filter: blur(6px);
  }
  .overlay.hidden{ display:none; }
  #resultStats, #champStats{ font-size:14px; line-height:1.8; opacity:0.9; }
  .flagchip{ display:inline-block; width:14px; height:14px; border-radius:3px; vertical-align:middle; margin-right:6px; }
  #roundList{ font-size:12px; opacity:0.8; line-height:1.9; max-width:340px; }
  #penUI{
    position:absolute; bottom:18px; left:50%; transform:translateX(-50%);

    #hud{ font-size:11px; flex-wrap:wrap; justify-content:center; row-gap:4px; }
    #hud .mini{ padding:4px 6px; }
    #radarCanvas{ width:80px; }
    #staminaWrap{ width:50px; }

  </div>

  </div>

  <div id="screen-match" class="screen hidden">
    <div id="hud">

      <div class="panel mini" id="nameBox">--</div>
      <div class="panel mini" id="staminaWrap"><span class="lbl">STAMINA</span><div id="staminaTrack"><div id="staminaFill"></div></div></div>

      <button class="iconBtn" id="pauseBtn" title="Pause">⏸</button>

    <div id="pitchWrap">

      <div id="bannerLayer"></div>
      <div id="shotMeterWrap" class="hidden"><div id="shotMeter"></div></div>
      <div id="penUI" class="hidden"></div>
    </div>
    <div id="touchControls">

      <div id="actionButtons">
        <button class="abtn" id="btnC">THRU</button>
        <button class="abtn" id="btnB">SHOOT</button>
        <button class="abtn" id="btnA">PASS</button>
      </div>
    </div>
  </div>

  <div id="screen-result" class="screen hidden">
    <h1 class="title" style="font-size:26px;" id="resultTitle">FULL TIME</h1>
    <div id="resultStats"></div>
    <div id="roundList"></div>
    <div class="mode-row" id="resultButtons"></div>
  </div>

  <div id="screen-champion" class="screen hidden">
    <h1 class="title" style="font-size:38px;">🏆 CHAMPIONS 🏆</h1>
    <div id="champStats"></div>
    <div class="mode-row"><button class="btn" id="champMenuBtn">MAIN MENU</button></div>
  </div>

  <div id="pauseOverlay" class="overlay hidden">
    <h2 style="letter-spacing:2px;">PAUSED</h2>
    <div class="mode-row">
      <button class="btn" id="resumeBtn">RESUME</button>
      <button class="btn secondary" id="restartBtn">RESTART MATCH</button>
      <button class="btn secondary" id="menuBtn">MAIN MENU</button>
    </div>
  </div>

</div>

function genericStats(key){
  const n = NATIONS[key];
  const avg = {PAC:0,SHO:0,PAS:0,DEF:0,STA:0};
  n.players.forEach(p=>{ avg.PAC+=p.PAC; avg.SHO+=p.SHO; avg.PAS+=p.PAS; avg.DEF+=p.DEF; avg.STA+=p.STA; });
  const c = n.players.length;
  return { PAC:avg.PAC/c, SHO:avg.SHO/c, PAS:avg.PAS/c, DEF:avg.DEF/c, STA:avg.STA/c };
}

/* ============================================================ AUDIO ============================================================ */
const AudioEngine = {
  ctx:null, muted:false, crowdGain:null, crowdSrc:null, crowdTargetVol:0.06,
  init(){
    if(this.ctx) { if(this.ctx.state==='suspended') this.ctx.resume(); return; }
    const AC = window.AudioContext || window.webkitAudioContext;
    if(!AC) return;
    this.ctx = new AC();
    this.startCrowd();
  },
  startCrowd(){
    const ctx = this.ctx;
    const bufSize = 2*ctx.sampleRate;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for(let i=0;i<bufSize;i++) data[i] = (Math.random()*2-1)*0.6;
    const src = ctx.createBufferSource();
    src.buffer = buf; src.loop = true;
    const filter = ctx.createBiquadFilter();
    filter.type='bandpass'; filter.frequency.value=900; filter.Q.value=0.6;
    const gain = ctx.createGain();
    gain.gain.value = 0.0001;
    src.connect(filter).connect(gain).connect(ctx.destination);
    src.start();
    this.crowdSrc = src; this.crowdGain = gain;
  },
  setCrowdIntensity(v){
    if(!this.crowdGain) return;
    const target = this.muted?0:clamp(0.02+v*0.09,0.0001,0.14);
    this.crowdGain.gain.linearRampToValueAtTime(target, this.ctx.currentTime+0.4);
  },
  tone(freq,duration,type,peak,delay){
    if(this.muted||!this.ctx) return;
    const t0 = this.ctx.currentTime+(delay||0);
    const osc = this.ctx.createOscillator(), gain = this.ctx.createGain();
    osc.type=type||'sine'; osc.frequency.setValueAtTime(freq,t0);
    gain.gain.setValueAtTime(0.0001,t0);
    gain.gain.linearRampToValueAtTime(peak===undefined?0.16:peak,t0+0.01);
    gain.gain.exponentialRampToValueAtTime(0.0001,t0+duration);
    osc.connect(gain).connect(this.ctx.destination);
    osc.start(t0); osc.stop(t0+duration+0.03);
  },
  kick(power){ this.tone(70+power*30,0.16,'sine',0.18+power*0.14); },
  pass(){ this.tone(340,0.06,'triangle',0.08); },
  tackle(){ this.tone(140,0.1,'square',0.14); },
  whistle(){ this.tone(1500,0.18,'square',0.1); this.tone(1500,0.18,'square',0.1,0.24); },
  goal(){
    [523.25,659.25,783.99,1046.5].forEach((f,i)=>this.tone(f,0.45,'sine',0.16,i*0.05));
    this.tone(90,0.6,'sawtooth',0.12,0.05);
  },
  miss(){ this.tone(300,0.3,'sawtooth',0.1); this.tone(220,0.35,'sawtooth',0.1,0.15); },
  roundUp(){ [440,554,659,880].forEach((f,i)=>this.tone(f,0.2,'square',0.12,i*0.09)); }
};

let uidCounter = 1;
function makePlayer(stats,name,pos,isStar,shirt){
  return {
    id: uidCounter++, name, shirt, pos, isStar, isHuman:false, isGK: pos==='GK',
    team:null, PAC:stats.PAC, SHO:stats.SHO, PAS:stats.PAS, DEF:stats.DEF, STA:stats.STA,
    stamina:100, x:0,y:0, vx:0,vy:0, facing:0,
    homeSlot:{x:0.5,y:0.5,role:pos}, sprint:false,
    recoveryTimer:0, tackleCooldown:0, aiTimer:rand(0,0.3), aiAction:{type:'HOLD'},
    radius: pos==='GK'?GK_R:PLAYER_R,
    kickCooldown:0
  };
}
function buildRoster(nationKey){
  const n = NATIONS[nationKey];
  const stars = n.players.map((p,i)=>makePlayer(p,p.name,p.pos,true,i+2));
  const gkStar = stars.find(p=>p.pos==='GK');
  const outfieldStars = stars.filter(p=>p.pos!=='GK');
  const gs = genericStats(nationKey);
  const roster = [];
  let shirt = 2;
  outfieldStars.forEach(p=>{ p.shirt = shirt++; roster.push(p); });
  const genericOutfieldNeeded = 6 - outfieldStars.length;
  for(let i=0;i<genericOutfieldNeeded;i++){
    const rolePool = ['DF','MF','FW'];
    const role = rolePool[i%3];
    const gp = makePlayer(gs, `${n.code} ${shirt}`, role, false, shirt);
    shirt++;
    roster.push(gp);
  }
  let gk;
  if(gkStar){ gk = gkStar; gk.shirt = 1; }
  else { gk = makePlayer({PAC:64,SHO:26,PAS:56,DEF:clamp(74+(teamRating(nationKey)-70)*0.25,58,92),STA:82}, `${n.code} 1`, 'GK', false, 1); }
  roster.unshift(gk);
  // assign formation slots: GK + 2DF + 2MF + 2FW
  const slotDefs = [
    {x:0.07,y:0.5,role:'GK'},
    {x:0.22,y:0.28,role:'DF'},{x:0.22,y:0.72,role:'DF'},
    {x:0.46,y:0.30,role:'MF'},{x:0.46,y:0.70,role:'MF'},
    {x:0.73,y:0.35,role:'FW'},{x:0.73,y:0.65,role:'FW'}
  ];
  const used = new Array(slotDefs.length).fill(false);
  const outfield = roster.filter(p=>p.pos!=='GK');
  used[0]=true; gk.homeSlot = slotDefs[0];
  const unassigned = [];
  // pass 1: match each player to a free slot of their own role
  outfield.forEach(p=>{
    let matched=false;
    for(let i=1;i<slotDefs.length;i++){
      if(!used[i] && slotDefs[i].role===p.pos){ used[i]=true; p.homeSlot=slotDefs[i]; matched=true; break; }
    }
    if(!matched) unassigned.push(p);
  });
  // pass 2: drop any leftover players (role slot was full) into whatever slots remain
  unassigned.forEach(p=>{
    for(let i=1;i<slotDefs.length;i++){
      if(!used[i]){ used[i]=true; p.homeSlot=slotDefs[i]; break; }
    }
  });
  return roster;
}

  });

/* ============================================================ INPUT ============================================================ */
const Input = {
  moveX:0, moveY:0,
  aPressed:false, aHeld:false, aReleased:false,
  bPressed:false, bHeld:false, bReleased:false,
  cPressed:false, cHeld:false, cReleased:false,
  keys:{},
  _prevA:false,_prevB:false,_prevC:false,
  pauseRequested:false, muteRequested:false, anyKeyRequested:false,
  frameReset(){
    this.aPressed=false; this.aReleased=false;
    this.bPressed=false; this.bReleased=false;
    this.cPressed=false; this.cReleased=false;
    this.pauseRequested=false; this.muteRequested=false; this.anyKeyRequested=false;
  },
  poll(){
    let mx=0,my=0;
    if(this.keys['ArrowLeft']||this.keys['a']||this.keys['A']) mx-=1;
    if(this.keys['ArrowRight']||this.keys['d']||this.keys['D']) mx+=1;
    if(this.keys['ArrowUp']||this.keys['w']||this.keys['W']) my-=1;
    if(this.keys['ArrowDown']||this.keys['s']||this.keys['S']) my+=1;
    if(this.joy.active){ mx=this.joy.x; my=this.joy.y; }
    const len = Math.sqrt(mx*mx+my*my);
    if(len>1){ mx/=len; my/=len; }
    this.moveX=mx; this.moveY=my;

    const aNow = !!(this.keys['j']||this.keys['J']||this.keys['z']||this.keys['Z']) || this.touchA;
    const bNow = !!(this.keys['k']||this.keys['K']||this.keys['x']||this.keys['X']) || this.touchB;
    const cNow = !!(this.keys['l']||this.keys['L']||this.keys['c']||this.keys['C']) || this.touchC;
    if(aNow && !this._prevA) this.aPressed=true;
    if(!aNow && this._prevA) this.aReleased=true;
    this.aHeld=aNow;
    if(bNow && !this._prevB) this.bPressed=true;
    if(!bNow && this._prevB) this.bReleased=true;
    this.bHeld=bNow;
    if(cNow && !this._prevC) this.cPressed=true;
    if(!cNow && this._prevC) this.cReleased=true;
    this.cHeld=cNow;
    this._prevA=aNow; this._prevB=bNow; this._prevC=cNow;
  },
  joy:{active:false,x:0,y:0}, touchA:false, touchB:false, touchC:false
};
function setupInput(app){
  window.addEventListener('keydown',(e)=>{
    if(!e.repeat){
      Input.anyKeyRequested = true;
      if(e.key==='p'||e.key==='P') Input.pauseRequested=true;
      if(e.key==='m'||e.key==='M') Input.muteRequested=true;
    }
    Input.keys[e.key]=true;
    if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
  });
  window.addEventListener('keyup',(e)=>{ Input.keys[e.key]=false; });

  const joyZone = document.getElementById('joyZone');
  const joyBase = document.getElementById('joyBase');
  const joyStick = document.getElementById('joyStick');
  let joyId = null, baseX=0, baseY=0;
  function joyStart(x,y,id){
    joyId=id; baseX=x; baseY=y;
    joyBase.style.left=(x-48)+'px'; joyBase.style.top=(y-48)+'px'; joyBase.style.display='block';
    joyStick.style.display='block';
    joyStick.style.left=(x-22)+'px'; joyStick.style.top=(y-22)+'px';
    Input.joy.active=true;
  }
  function joyMove(x,y){
    let dx=x-baseX, dy=y-baseY;
    const d = Math.sqrt(dx*dx+dy*dy), max=48;
    if(d>max){ dx=dx/d*max; dy=dy/d*max; }
    joyStick.style.left=(baseX+dx-22)+'px'; joyStick.style.top=(baseY+dy-22)+'px';
    Input.joy.x = dx/max; Input.joy.y = dy/max;
  }
  function joyEnd(){
    joyId=null; joyBase.style.display='none'; joyStick.style.display='none';
    Input.joy.active=false; Input.joy.x=0; Input.joy.y=0;
  }
  joyZone.addEventListener('touchstart',(e)=>{
    e.preventDefault(); Input.anyKeyRequested=true; AudioEngine.init();
    const t=e.changedTouches[0]; joyId=t.identifier; joyStart(t.clientX,t.clientY,t.identifier);
  },{passive:false});
  joyZone.addEventListener('touchmove',(e)=>{
    e.preventDefault();
    for(const t of e.changedTouches){ if(t.identifier===joyId) joyMove(t.clientX,t.clientY); }
  },{passive:false});
  joyZone.addEventListener('touchend',(e)=>{ e.preventDefault(); joyEnd(); },{passive:false});
  joyZone.addEventListener('touchcancel',(e)=>{ e.preventDefault(); joyEnd(); },{passive:false});
  joyZone.addEventListener('mousedown',(e)=>{ Input.anyKeyRequested=true; AudioEngine.init(); joyStart(e.clientX,e.clientY,'mouse'); });
  window.addEventListener('mousemove',(e)=>{ if(joyId==='mouse') joyMove(e.clientX,e.clientY); });
  window.addEventListener('mouseup',()=>{ if(joyId==='mouse') joyEnd(); });

  function bindBtn(id,key){
    const el = document.getElementById(id);
    const start=(e)=>{ e.preventDefault(); Input.anyKeyRequested=true; AudioEngine.init(); Input[key]=true; };
    const end=(e)=>{ e.preventDefault(); Input[key]=false; };
    el.addEventListener('touchstart',start,{passive:false});
    el.addEventListener('touchend',end,{passive:false});
    el.addEventListener('touchcancel',end,{passive:false});
    el.addEventListener('mousedown',start);
    window.addEventListener('mouseup',end);
  }
  bindBtn('btnA','touchA'); bindBtn('btnB','touchB'); bindBtn('btnC','touchC');

  document.body.addEventListener('touchstart',()=>{ AudioEngine.init(); },{passive:true, once:true});
  document.body.addEventListener('mousedown',()=>{ AudioEngine.init(); },{once:true});
}

/* ============================================================ RENDERER ============================================================ */
const pitchCanvas = document.getElementById('pitchCanvas');
const pitchCtx = pitchCanvas.getContext('2d');
const pitchWrap = document.getElementById('pitchWrap');
let viewScale = 1, cssW=0, cssH=0;
const cam = { x:PITCH_W/2, y:PITCH_H/2, zoom:CAM_ZOOM };

function resizePitchCanvas(){
  const rect = pitchWrap.getBoundingClientRect();
  const dpr = window.devicePixelRatio || 1;
  cssW = rect.width; cssH = rect.height;
  pitchCanvas.width = Math.round(rect.width*dpr);
  pitchCanvas.height = Math.round(rect.height*dpr);
  pitchCanvas.style.width = rect.width+'px';
  pitchCanvas.style.height = rect.height+'px';
  pitchCtx.setTransform(dpr,0,0,dpr,0,0);
  const viewW = PITCH_W/cam.zoom;
  viewScale = cssW/viewW;
}
function worldToScreen(x,y){
  return { x:(x-cam.x)*viewScale + cssW/2, y:(y-cam.y)*viewScale + cssH/2 };
}
function updateCamera(target){
  const viewW = PITCH_W/cam.zoom, viewH = PITCH_H/cam.zoom;
  cam.x = lerp(cam.x, target.x, CAM_LERP);
  cam.y = lerp(cam.y, target.y, CAM_LERP);
  cam.x = clamp(cam.x, viewW/2, PITCH_W-viewW/2);
  cam.y = clamp(cam.y, viewH/2, PITCH_H-viewH/2);
}

function drawPitch(){
  const ctx = pitchCtx;
  ctx.clearRect(0,0,cssW,cssH);
  ctx.fillStyle = '#0a2f18';
  ctx.fillRect(0,0,cssW,cssH);
  ctx.save();
  const stripes = 12;
  const stripeW = PITCH_W/stripes;
  for(let i=0;i<stripes;i++){
    ctx.fillStyle = i%2===0 ? '#1a6b34' : '#175f2e';
    const p1 = worldToScreen(i*stripeW,-40), p2 = worldToScreen((i+1)*stripeW, PITCH_H+40);
    ctx.fillRect(p1.x, p1.y, (p2.x-p1.x), (p2.y-p1.y));
  }
  ctx.restore();

  ctx.strokeStyle = 'rgba(255,255,255,0.75)'; ctx.lineWidth = Math.max(1.5, 2.4*viewScale);
  function seg(x1,y1,x2,y2){ const a=worldToScreen(x1,y1), b=worldToScreen(x2,y2); ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); }
  seg(0,0,PITCH_W,0); seg(0,PITCH_H,PITCH_W,PITCH_H); seg(0,0,0,PITCH_H); seg(PITCH_W,0,PITCH_W,PITCH_H);
  seg(PITCH_W/2,0,PITCH_W/2,PITCH_H);
  const cc = worldToScreen(PITCH_W/2,PITCH_H/2);
  ctx.beginPath(); ctx.arc(cc.x,cc.y,70*viewScale,0,Math.PI*2); ctx.stroke();
  // boxes
  [0,PITCH_W].forEach(gx=>{
    const dir = gx===0?1:-1;
    seg(gx, PITCH_H/2-140, gx+dir*90, PITCH_H/2-140);
    seg(gx, PITCH_H/2+140, gx+dir*90, PITCH_H/2+140);
    seg(gx+dir*90, PITCH_H/2-140, gx+dir*90, PITCH_H/2+140);
  });
  // goal mouths
  ctx.lineWidth = Math.max(2.5, 4*viewScale);
  ctx.strokeStyle = '#fff';
  seg(0,PITCH_H/2-GOAL_HALF,0,PITCH_H/2+GOAL_HALF);
  seg(PITCH_W,PITCH_H/2-GOAL_HALF,PITCH_W,PITCH_H/2+GOAL_HALF);
  ctx.fillStyle = 'rgba(255,255,255,0.08)';
  [0,PITCH_W].forEach(gx=>{
    const dir = gx===0?1:6;
    const a = worldToScreen(gx, PITCH_H/2-GOAL_HALF), b = worldToScreen(gx===0?18:PITCH_W-18, PITCH_H/2+GOAL_HALF);
    ctx.fillRect(Math.min(a.x,b.x), a.y, Math.abs(b.x-a.x), b.y-a.y);
  });
}

function drawPlayer(p, isSelected){
  const s = worldToScreen(p.x,p.y);
  const r = p.radius*viewScale;
  const ctx = pitchCtx;
  ctx.save();
  ctx.globalAlpha = 0.28;
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.ellipse(s.x, s.y+r*0.6, r*0.9, r*0.4, 0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha = 1;
  if(isSelected){
    ctx.strokeStyle = '#ffd93d'; ctx.lineWidth = 3;
    ctx.shadowColor = '#ffd93d'; ctx.shadowBlur = 14;
    ctx.beginPath(); ctx.arc(s.x,s.y,r+5,0,Math.PI*2); ctx.stroke();
    ctx.shadowBlur = 0;
  }
  ctx.fillStyle = p.team.secondary;
  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = p.team.primary;
  ctx.beginPath(); ctx.arc(s.x,s.y,r*0.72,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.4)'; ctx.lineWidth=1; ctx.stroke();
  // facing wedge
  ctx.fillStyle = p.team.secondary;
  ctx.beginPath();
  ctx.moveTo(s.x+Math.cos(p.facing)*r*1.15, s.y+Math.sin(p.facing)*r*1.15);
  ctx.lineTo(s.x+Math.cos(p.facing+2.4)*r*0.5, s.y+Math.sin(p.facing+2.4)*r*0.5);
  ctx.lineTo(s.x+Math.cos(p.facing-2.4)*r*0.5, s.y+Math.sin(p.facing-2.4)*r*0.5);
  ctx.closePath(); ctx.fill();
  if(p.isHuman){
    ctx.fillStyle = '#fff'; ctx.font = `700 ${Math.max(9,10*viewScale)}px sans-serif`;
    ctx.textAlign='center';
    ctx.fillText(p.name.split(' ').pop(), s.x, s.y - r - 6);
  }
  ctx.restore();
}
function drawBall(ball){
  const s = worldToScreen(ball.x,ball.y);
  const r = BALL_R*viewScale;
  const ctx = pitchCtx;
  ctx.save();
  ctx.globalAlpha=0.3; ctx.fillStyle='#000';
  ctx.beginPath(); ctx.ellipse(s.x,s.y+r*0.6,r*0.9,r*0.35,0,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
  ctx.fillStyle='#fff';
  ctx.beginPath(); ctx.arc(s.x,s.y,r,0,Math.PI*2); ctx.fill();
  ctx.strokeStyle='#222'; ctx.lineWidth=1; ctx.stroke();
  ctx.restore();
}

let particles = [];
function spawnConfetti(x,y,n){
  const cols = ['#ffd93d','#21c7ff','#2bff88','#ff5470','#a239ff'];
  for(let i=0;i<n;i++){
    const s = worldToScreen(x,y);
    particles.push({x:s.x,y:s.y,vx:rand(-160,160),vy:rand(-260,-60),g:340,life:0,maxLife:rand(900,1500),color:pick(cols),size:rand(3,6)});
  }
}
function updateParticles(dt){
  const dtS=dt/1000;
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i]; p.vy+=p.g*dtS; p.x+=p.vx*dtS; p.y+=p.vy*dtS; p.life+=dt;
    if(p.life>=p.maxLife) particles.splice(i,1);
  }
}
function renderParticles(){
  const ctx = pitchCtx;
  for(const p of particles){
    const a = clamp(1-p.life/p.maxLife,0,1);
    ctx.save(); ctx.globalAlpha=a; ctx.fillStyle=p.color;
    ctx.fillRect(p.x-p.size/2,p.y-p.size/2,p.size,p.size);
    ctx.restore();
  }
}

function drawCrowd(){
  const ctx = pitchCtx;
  ctx.save();
  const t = performance.now()/500;
  const bandH = 10;
  for(let i=0;i<Math.floor(cssW/14);i++){
    const x = i*14+7;
    const wob = Math.sin(t+i)*2;
    ctx.fillStyle = `hsl(${(i*47)%360},70%,${55+ (Math.sin(t*2+i)*10)}%)`;
    ctx.fillRect(x-2, 2+wob, 4,4);
    ctx.fillRect(x-2, cssH-6+wob, 4,4);
  }
  ctx.restore();
}

let shake = {time:0,dur:0,mag:0};
function triggerShake(mag,dur){ shake={time:dur,dur:dur,mag:mag}; }
function updateShake(dt){
  if(shake.time>0){
    shake.time-=dt;
    const t = clamp(shake.time/shake.dur,0,1);
    const m = shake.mag*t;
    pitchWrap.style.transform = `translate(${rand(-m,m)}px,${rand(-m,m)}px)`;
    if(shake.time<=0) pitchWrap.style.transform='';
  }
}

/* ============================================================ AI ============================================================ */
function effStat(p,stat){
  const base = p[stat];
  const scale = (p.team && p.team.aiScale) ? p.team.aiScale : 1;
  const boosted = p.isHuman ? base : clamp(base*scale,1,99);
  if(p.stamina < STAMINA_LOW && (stat==='PAC'||stat==='SHO')) return boosted*STAMINA_LOW_MULT;
  return boosted;
}
function maxSpeed(p){ return SPEED_BASE + effStat(p,'PAC')*SPEED_PAC_SCALE; }

function nearestOpponentDist(p, match){
  const opp = p.team===match.teamA ? match.teamB : match.teamA;
  let best = 9999;
  opp.players.forEach(o=>{ const d=dist(p.x,p.y,o.x,o.y); if(d<best) best=d; });
  return best;
}
function findPresser(team, targetX, targetY){
  let best=null, bd=Infinity;
  team.players.forEach(p=>{ if(p.isGK) return; const d=dist(p.x,p.y,targetX,targetY); if(d<bd){bd=d;best=p;} });
  return best;
}

function aiOutfieldDecide(p, match){
  const ball = match.ball;
  const myTeam = p.team, oppTeam = myTeam===match.teamA?match.teamB:match.teamA;
  const teamHasBall = ball.owner && ball.owner.team===myTeam;
  const oppHasBall = ball.owner && ball.owner.team===oppTeam;
  const isOwner = ball.owner===p;
  const goalX = myTeam.attackDir===1?PITCH_W:0;

  if(isOwner){
    const dGoal = dist(p.x,p.y,goalX,PITCH_H/2);
    const shootRange = 150 + effStat(p,'SHO')*1.15;
    const nearOpp = nearestOpponentDist(p,match);
    if(dGoal < shootRange && nearOpp > 26){
      return {type:'SHOOT'};
    }
    let best=null,bestScore=-9999;
    myTeam.players.forEach(t=>{
      if(t===p||t.isGK) return;
      const adv = (myTeam.attackDir===1) ? (t.x-p.x) : (p.x-t.x);
      const opD = nearestOpponentDist(t,match);
      const passDist = dist(p.x,p.y,t.x,t.y);
      if(passDist>420) return;
      let score = adv*0.6 + opD*0.9 - passDist*0.15;
      if(t.isHuman) score += 40;
      if(score>bestScore){ bestScore=score; best=t; }
    });
    if(best && bestScore>10) return {type:'PASS', target:best};
    return {type:'DRIBBLE', goalX};
  }

  if(teamHasBall){
    const home = homeWorldPos(myTeam,p);
    const tx = lerp(home.x, ball.x, 0.22);
    const ty = lerp(home.y, ball.y, 0.15);
    return {type:'MOVE', x:tx, y:ty};
  }
  if(oppHasBall){
    const presser = findPresser(myTeam, ball.x, ball.y);
    if(presser===p){
      return {type:'CHASE', x:ball.x, y:ball.y};
    }
    const home = homeWorldPos(myTeam,p);
    const tx = lerp(home.x, ball.x, 0.12);
    const ty = lerp(home.y, ball.y, 0.2);
    return {type:'MOVE', x:tx, y:ty};
  }
  // loose ball
  const presser = findPresser(myTeam, ball.x, ball.y);
  if(presser===p) return {type:'CHASE', x:ball.x+ball.vx*0.15, y:ball.y+ball.vy*0.15};
  const home = homeWorldPos(myTeam,p);
  return {type:'MOVE', x:lerp(home.x,ball.x,0.15), y:lerp(home.y,ball.y,0.15)};
}

function aiGKDecide(p, match){
  const ball = match.ball;
  const myGoalX = p.team.attackDir===1 ? 0 : PITCH_W;
  const lineX = myGoalX===0 ? 26 : PITCH_W-26;
  let ty = clamp(ball.y, PITCH_H/2-GOAL_HALF+8, PITCH_H/2+GOAL_HALF-8);
  let tx = lineX;
  const ballNear = dist(ball.x,ball.y,myGoalX,PITCH_H/2) < 220;
  if(!ball.owner && ballNear){
    tx = lineX + (myGoalX===0?1:-1)*Math.min(40, Math.max(0,220-dist(ball.x,ball.y,myGoalX,PITCH_H/2))*0.25);
  }
  return {type:'MOVE', x:tx, y:ty};
}

function moveToward(p, tx, ty, dt, speedFrac){
  const dx=tx-p.x, dy=ty-p.y;
  const d = Math.sqrt(dx*dx+dy*dy);
  const ms = maxSpeed(p) * speedFrac;
  let dvx=0,dvy=0;
  if(d>2){ dvx=dx/d*ms; dvy=dy/d*ms; p.facing=Math.atan2(dy,dx); }
  const accel = ms/ACCEL_TIME;
  const maxDelta = accel*(dt/1000);
  p.vx = lerp(p.vx,dvx, Math.min(1,maxDelta/(Math.abs(dvx-p.vx)+0.001)));
  p.vy = lerp(p.vy,dvy, Math.min(1,maxDelta/(Math.abs(dvy-p.vy)+0.001)));
  p.vx = lerp(p.vx,dvx,0.18); p.vy = lerp(p.vy,dvy,0.18);
}

/* ============================================================ MATCH ============================================================ */
function newMatch(teamA, teamB, opts){
  opts = opts||{};
  const match = {
    teamA, teamB, ball: makeBall(),
    clock:0, half:1, state:'BANNER', bannerText:'', pauseTimer:0, onBannerEnd:null,
    isKnockout: !!opts.isKnockout, humanTeam: teamA.humanPlayer?teamA:(teamB.humanPlayer?teamB:null),
    ended:false, winner:null, penalty:null, roundLabel: opts.roundLabel||'MATCH'
  };
  teamA.players.forEach(p=>p.team=teamA);
  teamB.players.forEach(p=>p.team=teamB);
  placeTeamAtFormation(teamA); placeTeamAtFormation(teamB);
  return match;
}
function showBanner(match,text,duration,cb){
  match.state='BANNER'; match.bannerText=text; match.pauseTimer=duration; match.onBannerEnd=cb;
  renderBannerDOM(text);
}
function renderBannerDOM(text){
  const layer = document.getElementById('bannerLayer');
  layer.innerHTML = text ? `<div class="banner">${text}</div>` : '';
}
function kickoff(match, possessingTeam){
  placeTeamAtFormation(match.teamA); placeTeamAtFormation(match.teamB);
  match.ball.x = PITCH_W/2; match.ball.y = PITCH_H/2; match.ball.vx=0; match.ball.vy=0;
  let taker = possessingTeam.players.filter(p=>!p.isGK).sort((a,b)=>dist(a.x,a.y,PITCH_W/2,PITCH_H/2)-dist(b.x,b.y,PITCH_W/2,PITCH_H/2))[0];
  match.ball.owner = taker; match.ball.lastTeam = possessingTeam;
  AudioEngine.whistle();
  showBanner(match, half2Label(match), KICKOFF_FREEZE_TIME, ()=>{ match.state='PLAY'; renderBannerDOM(''); });
}
function half2Label(match){ return match.clock===0 && match.half===1 ? 'KICK OFF' : (match.half===2?'2ND HALF':'KICK OFF'); }

function performShot(match, p, chargeFrac){
  const goalX = p.team.attackDir===1?PITCH_W:0;
  const targetY = PITCH_H/2 + rand(-1,1)*GOAL_HALF*0.55;
  let dx = goalX-p.x, dy = targetY-p.y;
  const d = Math.sqrt(dx*dx+dy*dy)||1; dx/=d; dy/=d;
  const acc = clamp(effStat(p,'SHO')/99,0.2,1);
  const spread = (1-acc)*0.5;
  const ang = Math.atan2(dy,dx) + rand(-spread,spread);
  const speed = (SHOT_BASE + effStat(p,'SHO')*SHOT_SHO_SCALE) * (SHOT_CHARGE_MIN_FRAC + (1-SHOT_CHARGE_MIN_FRAC)*chargeFrac);
  match.ball.vx = Math.cos(ang)*speed; match.ball.vy = Math.sin(ang)*speed;
  match.ball.owner = null; match.ball.lastTeam = p.team; match.ball.lastToucher = p;
  match.ball.deadTimer = 0.15; match.ball.selfExcludeTimer = 0.5;
  p.kickCooldown = 0.3;
  AudioEngine.kick(chargeFrac);
}
function performPass(match, p, target, through){
  const leadT = through?THROUGH_LEAD:0.35;
  const tx = target.x + target.vx*leadT, ty = target.y + target.vy*leadT;
  let dx=tx-p.x, dy=ty-p.y; const d=Math.sqrt(dx*dx+dy*dy)||1; dx/=d; dy/=d;
  const scale = through?2.0:PASS_PAS_SCALE;
  const speed = PASS_BASE + effStat(p,'PAS')*scale*0.55;
  match.ball.vx = dx*speed; match.ball.vy = dy*speed;
  match.ball.owner = null; match.ball.lastTeam = p.team; match.ball.lastToucher = p;
  match.ball.deadTimer = 0.12; match.ball.selfExcludeTimer = 0.35;
  p.kickCooldown = 0.2;
  AudioEngine.pass();
}
function attemptTackle(match, tackler, slide){
  const owner = match.ball.owner;
  if(!owner || owner.team===tackler.team) return false;
  const d = dist(tackler.x,tackler.y,owner.x,owner.y);
  const radius = TACKLE_BASE_R + effStat(tackler,'DEF')*TACKLE_DEF_SCALE + (slide?8:0);
  if(d>radius) return false;
  tackler.tackleCooldown = TACKLE_COOLDOWN;
  const carrierSkill = (owner.PAC+owner.PAS)/2;
  let chance = clamp(0.32 + (effStat(tackler,'DEF')-carrierSkill)/150 + (slide?0.15:0), 0.08, 0.88);
  const success = Math.random() < chance;
  AudioEngine.tackle();
  if(success){
    match.ball.owner = null;
    match.ball.vx = (owner.x-tackler.x)*0.6; match.ball.vy=(owner.y-tackler.y)*0.6;
    match.ball.lastTeam = tackler.team; match.ball.lastToucher = tackler;
    match.ball.deadTimer = 0.1;
  } else {
    const foulChance = slide?0.5:0.28;
    if(Math.random()<foulChance){
      match.ball.owner = owner; match.ball.vx=0; match.ball.vy=0;
      match.ball.x = tackler.x; match.ball.y = tackler.y;
      match.ball.x = owner.x; match.ball.y = owner.y;
      showBanner(match,'FOUL — FREE KICK', FOUL_PAUSE, ()=>{ match.state='PLAY'; renderBannerDOM(''); });
    }
  }
  if(slide) tackler.recoveryTimer = SLIDE_RECOVERY;
  return true;
}

function resetPlayerVelocities(match){
  match.teamA.players.forEach(p=>{p.vx=0;p.vy=0;});
  match.teamB.players.forEach(p=>{p.vx=0;p.vy=0;});
}

function handleGoal(match, scoringTeam, scorer){
  scoringTeam.score++;
  triggerShake(6,500);
  spawnConfetti(PITCH_W/2, PITCH_H/2, 50);
  AudioEngine.goal();
  const concedingTeam = scoringTeam===match.teamA?match.teamB:match.teamA;
  showBanner(match, `GOAL! ${scorer?scorer.name.toUpperCase():''}`, GOAL_CELEBRATION_TIME, ()=>{
    renderBannerDOM('');
    kickoff(match, concedingTeam);
  });
}

function updateBallOutOfPlay(match, dt){
  const ball = match.ball;
  if(ball.y < BALL_R){ ball.y=BALL_R; ball.vy=-ball.vy*0.4; }
  if(ball.y > PITCH_H-BALL_R){ ball.y=PITCH_H-BALL_R; ball.vy=-ball.vy*0.4; }
  if(ball.x<0 || ball.x>PITCH_W){
    const inMouth = ball.y>PITCH_H/2-GOAL_HALF && ball.y<PITCH_H/2+GOAL_HALF;
    if(inMouth){
      const scoringTeam = ball.x<0 ? (match.teamA.attackDir===1?match.teamA:match.teamB) : (match.teamA.attackDir===-1?match.teamA:match.teamB);
      handleGoal(match, scoringTeam, ball.lastToucher);
      return true;
    } else {
      const defendingTeam = ball.x<0 ? (match.teamA.attackDir===1?match.teamB:match.teamA) : (match.teamA.attackDir===-1?match.teamB:match.teamA);
      ball.x = clamp(ball.x,20,PITCH_W-20);
      ball.vx=0; ball.vy=0;
      const gk = defendingTeam.players.find(p=>p.isGK);
      ball.owner = gk; ball.x = gk.x; ball.y = gk.y;
      return false;
    }
  }
  return false;
}

function matchUpdate(match, dt){
  const dtS = dt/1000;
  if(match.state==='BANNER'){
    match.pauseTimer -= dtS;
    updateShake(dtS); updateParticles(dt);
    if(match.pauseTimer<=0){
      const cb = match.onBannerEnd; match.onBannerEnd=null;
      if(cb) cb();
    }
    return;
  }
  if(match.state!=='PLAY') return;

  match.clock += dtS;
  AudioEngine.setCrowdIntensity(Math.abs(match.ball.x-PITCH_W/2)/(PITCH_W/2));

  const human = match.humanTeam ? match.humanTeam.players.find(p=>p.isHuman) : null;
  if(human) updateHumanControl(match, human, dt);

  [match.teamA, match.teamB].forEach(team=>{
    team.players.forEach(p=>{
      if(p.isHuman) return;
      p.aiTimer -= dtS;
      if(p.aiTimer<=0){ p.aiAction = p.isGK ? aiGKDecide(p,match) : aiOutfieldDecide(p,match); p.aiTimer = rand(AI_DECISION_MIN,AI_DECISION_MAX); }
      applyAiAction(match,p,dt);
    });
  });

  [match.teamA, match.teamB].forEach(team=>{
    team.players.forEach(p=>{
      if(p.tackleCooldown>0) p.tackleCooldown-=dtS;
      if(p.kickCooldown>0) p.kickCooldown-=dtS;
      if(p.recoveryTimer>0){ p.recoveryTimer-=dtS; }
      if(p.sprint && (p.vx||p.vy)){ p.stamina = clamp(p.stamina-STAMINA_DRAIN*dtS,0,100); }
      else { p.stamina = clamp(p.stamina+STAMINA_REGEN*dtS,0,100); }
      p.x += p.vx*dtS; p.y += p.vy*dtS;
      p.x = clamp(p.x, p.radius, PITCH_W-p.radius);
      p.y = clamp(p.y, p.radius, PITCH_H-p.radius);
      p.vx*=0.9; p.vy*=0.9;
    });
  });

  // AI tackling attempts
  [match.teamA, match.teamB].forEach(team=>{
    team.players.forEach(p=>{
      if(p.isHuman||p.isGK) return;
      if(match.ball.owner && match.ball.owner.team!==p.team && p.tackleCooldown<=0){
        const d = dist(p.x,p.y,match.ball.owner.x,match.ball.owner.y);
        if(d < TACKLE_BASE_R+effStat(p,'DEF')*TACKLE_DEF_SCALE && Math.random()<0.4){
          attemptTackle(match,p,false);
        }
      }
    });
  });

  const ball = match.ball;
  if(ball.deadTimer>0) ball.deadTimer -= dtS;
  if(ball.selfExcludeTimer>0) ball.selfExcludeTimer -= dtS;
  if(ball.owner){
    const o = ball.owner;
    const off = o.radius + BALL_R + 4;
    ball.x = o.x + Math.cos(o.facing)*off;
    ball.y = o.y + Math.sin(o.facing)*off;
    ball.vx = o.vx; ball.vy = o.vy;
  } else {
    ball.x += ball.vx*dtS; ball.y += ball.vy*dtS;
    const drag = Math.exp(-BALL_DRAG*dtS);
    ball.vx*=drag; ball.vy*=drag;
    if(updateBallOutOfPlay(match, dt)) return;
    if(ball.deadTimer<=0 && Math.sqrt(ball.vx*ball.vx+ball.vy*ball.vy) < PICKUP_MAX_SPEED){
      let claimant=null, bd=Infinity;
      [match.teamA,match.teamB].forEach(team=>team.players.forEach(p=>{
        if(p===ball.lastToucher && ball.selfExcludeTimer>0) return;
        const d = dist(p.x,p.y,ball.x,ball.y);
        if(d<PICKUP_R+p.radius*0.3 && d<bd){ bd=d; claimant=p; }
      }));
      if(claimant){ ball.owner=claimant; ball.vx=0; ball.vy=0; ball.lastTeam=claimant.team; ball.lastToucher=claimant; }
    }
  }

  if(match.clock >= HALF_DURATION){
    if(match.half===1){
      match.half=2; match.clock=0;
      match.teamA.attackDir*=-1; match.teamB.attackDir*=-1;
      showBanner(match,'HALF TIME', HALFTIME_PAUSE, ()=>{ renderBannerDOM(''); kickoff(match, match.teamB); });
    } else {
      finishRegulation(match);
    }
  }
}

function updateHumanControl(match, p, dt){
  const dtS = dt/1000;
  Input.poll();
  const hasBall = match.ball.owner===p;
  const moving = Math.abs(Input.moveX)>0.05 || Math.abs(Input.moveY)>0.05;
  if(p.recoveryTimer<=0 && moving){
    p.facing = Math.atan2(Input.moveY, Input.moveX);
  }
  p.sprint = Input.cHeld;
  const speedFrac = p.recoveryTimer>0 ? 0.25 : (Input.cHeld ? (hasBall?DRIBBLE_SPEED_FACTOR:1) : BASE_MOVE_FRACTION);
  const ms = maxSpeed(p)*speedFrac;
  const targetVx = Input.moveX*ms, targetVy = Input.moveY*ms;
  p.vx = lerp(p.vx,targetVx,0.28); p.vy = lerp(p.vy,targetVy,0.28);

  // C tap detection for through ball
  if(Input.cPressed) p._cHoldStart = performance.now();
  if(Input.cReleased && p._cHoldStart && performance.now()-p._cHoldStart<220 && hasBall){
    const best = bestPassTarget(match,p,true);
    if(best) performPass(match,p,best,true);
  }

  if(hasBall){
    if(Input.aPressed){
      const best = bestPassTarget(match,p,false);
      if(best) performPass(match,p,best,false);
    }
    if(Input.bHeld){
      p._chargeStart = p._chargeStart || performance.now();
      const frac = clamp((performance.now()-p._chargeStart)/(SHOT_CHARGE_MAX*1000),0,1);
      document.getElementById('shotMeterWrap').classList.remove('hidden');
      document.getElementById('shotMeter').style.width = (frac*100)+'%';
    }
    if(Input.bReleased && p._chargeStart){
      const frac = clamp((performance.now()-p._chargeStart)/(SHOT_CHARGE_MAX*1000),0.25,1);
      performShot(match,p,frac);
      p._chargeStart=null;
      document.getElementById('shotMeterWrap').classList.add('hidden');
    }
  } else {
    if(!Input.bHeld) { p._chargeStart=null; document.getElementById('shotMeterWrap').classList.add('hidden'); }
    if(Input.aPressed && p.tackleCooldown<=0){ attemptTackle(match,p,false); }
    if(Input.bPressed && p.tackleCooldown<=0){
      p.vx += Math.cos(p.facing)*140; p.vy += Math.sin(p.facing)*140;
      attemptTackle(match,p,true);
    }
  }
}
function bestPassTarget(match,p,through){
  let best=null,bestScore=-9999;
  p.team.players.forEach(t=>{
    if(t===p||t.isGK) return;
    const adv = (p.team.attackDir===1)?(t.x-p.x):(p.x-t.x);
    const opD = nearestOpponentDist(t,match);
    const passDist = dist(p.x,p.y,t.x,t.y);
    if(passDist>460) return;
    const ang = Math.atan2(t.y-p.y,t.x-p.x);
    let diff = Math.abs(ang-p.facing); if(diff>Math.PI) diff=2*Math.PI-diff;
    if(diff>2.2) return;
    let score = adv*(through?1.0:0.5) + opD*0.8 - passDist*0.1;
    if(score>bestScore){ bestScore=score; best=t; }
  });
  return best;
}
function applyAiAction(match,p,dt){
  const dtS=dt/1000;
  const a = p.aiAction||{type:'HOLD'};
  if(a.type==='SHOOT'){
    if(!p._aiCharge){ p._aiCharge = 0.25+Math.random()*0.4; p._aiChargeT=0; }
    p._aiChargeT+=dtS;
    if(p._aiChargeT>=p._aiCharge){ performShot(match,p,0.75+Math.random()*0.25); p._aiCharge=null; p.aiAction={type:'HOLD'}; }
    moveToward(p,p.x,p.y,dt,0);
  } else if(a.type==='PASS'){
    if(!p._aiCharge){ p._aiCharge=0.15+Math.random()*0.2; p._aiChargeT=0; }
    p._aiChargeT+=dtS;
    if(p._aiChargeT>=p._aiCharge){ performPass(match,p,a.target,effStat(p,'PAS')>=88); p._aiCharge=null; p.aiAction={type:'HOLD'}; }
  } else if(a.type==='DRIBBLE'){
    const nearOppD = nearestOpponentDist(p,match);
    let tx=a.goalX, ty=PITCH_H/2+Math.sin(performance.now()/600+p.id)*40;
    moveToward(p, tx, p.y + (ty-p.y)*0.3, dt, DRIBBLE_SPEED_FACTOR);
    p._aiCharge=null;
  } else if(a.type==='CHASE'){
    moveToward(p, a.x, a.y, dt, 1);
    p._aiCharge=null;
  } else if(a.type==='MOVE'){
    moveToward(p, a.x, a.y, dt, 0.6);
    p._aiCharge=null;
  } else {
    p.vx*=0.85; p.vy*=0.85; p._aiCharge=null;
  }
  p.sprint = a.type==='CHASE';
}

function finishRegulation(match){
  if(match.teamA.score===match.teamB.score && match.isKnockout){
    startPenalties(match);
  } else {
    match.ended = true;
    match.winner = match.teamA.score>match.teamB.score?match.teamA: (match.teamB.score>match.teamA.score?match.teamB:null);
    AudioEngine.whistle();
    showBanner(match,'FULL TIME',1.6,()=>{ renderBannerDOM(''); onMatchEnded(match); });
  }
}

/* ============================================================ PENALTIES ============================================================ */
function startPenalties(match){
  const kOrder = t => t.players.filter(p=>!p.isGK).sort((a,b)=>effStat(b,'SHO')-effStat(a,'SHO'));
  match.penalty = {
    active:true, ordA:kOrder(match.teamA), ordB:kOrder(match.teamB),
    kicksA:0, kicksB:0, scoreA:0, scoreB:0, turn:'A', phase:'INTRO', timer:1.2,
    aimY: PITCH_H/2, charge:0, chargeStart:null, aiAimY:null, resultText:''
  };
  showBanner(match,'PENALTIES!',1.4,()=>{ renderBannerDOM(''); match.state='PENALTY'; setupPenaltyKick(match); });
}
function currentKicker(match){
  const pen = match.penalty;
  const team = pen.turn==='A'?match.teamA:match.teamB;
  const ord = pen.turn==='A'?pen.ordA:pen.ordB;
  const idx = (pen.turn==='A'?pen.kicksA:pen.kicksB) % ord.length;
  return {team, kicker: ord[idx]};
}
function setupPenaltyKick(match){
  const pen = match.penalty;
  const {team,kicker} = currentKicker(match);
  const defTeam = team===match.teamA?match.teamB:match.teamA;
  const gk = defTeam.players.find(p=>p.isGK);
  match.ball.x = PITCH_W-130; match.ball.y = PITCH_H/2; match.ball.vx=0; match.ball.vy=0; match.ball.owner=null;
  kicker.x = PITCH_W-170; kicker.y = PITCH_H/2; kicker.facing=0;
  gk.x = PITCH_W-24; gk.y = PITCH_H/2;
  pen.phase='AIM'; pen.timer = 2.6; pen.aimY = PITCH_H/2; pen.charge=0; pen.chargeStart=null;
  pen.aiAimY = PITCH_H/2 + rand(-1,1)*(1-effStat(kicker,'SHO')/130)*GOAL_HALF*1.5;
  pen.kickerRef = kicker; pen.gkRef = gk; pen.attackTeam = team; pen.defendTeam = defTeam;
  const humanIsKicking = team.humanPlayer!==null;
  pen.humanRole = humanIsKicking ? 'KICK' : 'SAVE';
  updatePenUI(match);
}
function updatePenUI(match){
  const pen = match.penalty;
  const el = document.getElementById('penUI');
  el.classList.remove('hidden');
  el.innerHTML = `${match.teamA.code} ${pen.scoreA} - ${pen.scoreB} ${match.teamB.code}<br>${pen.humanRole==='KICK' ? 'Aim: move stick, hold SHOOT to charge, release to strike' : 'Move to dive and save!'}`;
}
function penaltyUpdate(match, dt){
  const dtS = dt/1000;
  const pen = match.penalty;
  Input.poll();
  if(pen.phase==='AIM'){
    pen.timer -= dtS;
    if(pen.humanRole==='KICK'){
      pen.aimY = clamp(pen.aimY + Input.moveY*160*dtS, PITCH_H/2-GOAL_HALF*0.95, PITCH_H/2+GOAL_HALF*0.95);
      pen.kickerRef.y = PITCH_H/2;
      if(Input.bHeld){ pen.chargeStart = pen.chargeStart||performance.now(); pen.charge = clamp((performance.now()-pen.chargeStart)/900,0,1);
        document.getElementById('shotMeterWrap').classList.remove('hidden');
        document.getElementById('shotMeter').style.width=(pen.charge*100)+'%';
      }
      if(Input.bReleased && pen.chargeStart){ resolvePenaltyKick(match, pen.aimY, clamp(pen.charge,0.3,1)); return; }
      if(pen.timer<=0){ resolvePenaltyKick(match, pen.aimY, 0.7); return; }
    } else {
      pen.gkRef.y = clamp(pen.gkRef.y + Input.moveY*220*dtS, PITCH_H/2-GOAL_HALF, PITCH_H/2+GOAL_HALF);
      if(pen.timer<=0){ resolvePenaltyKick(match, pen.aiAimY, 0.8); return; }
    }
  } else if(pen.phase==='FLIGHT'){
    pen.timer -= dtS;
    const ball = match.ball;
    ball.x += ball.vx*dtS; ball.y += ball.vy*dtS;
    if(pen.timer<=0 || ball.x>PITCH_W+10){
      resolvePenaltyOutcome(match);
    }
  } else if(pen.phase==='RESULT'){
    pen.timer -= dtS;
    if(pen.timer<=0){ advancePenalty(match); }
  }
}
function resolvePenaltyKick(match, aimY, charge){
  const pen = match.penalty;
  document.getElementById('shotMeterWrap').classList.add('hidden');
  const kicker = pen.kickerRef;
  const acc = clamp(effStat(kicker,'SHO')/99,0.25,1);
  const finalY = clamp(aimY + rand(-1,1)*(1-acc)*40, PITCH_H/2-GOAL_HALF*1.1, PITCH_H/2+GOAL_HALF*1.1);
  pen.shotY = finalY;
  match.ball.vx = 620+charge*140; match.ball.vy = (finalY-match.ball.y)/0.55;
  const gk = pen.gkRef;
  const guess = lerp(rand(PITCH_H/2-GOAL_HALF,PITCH_H/2+GOAL_HALF), finalY, clamp(effStat(gk,'DEF')/130,0,0.85));
  pen.gkDiveTarget = pen.humanRole==='SAVE' ? gk.y : guess;
  pen.phase='FLIGHT'; pen.timer=0.55;
}
function resolvePenaltyOutcome(match){
  const pen = match.penalty;
  const inGoal = pen.shotY>PITCH_H/2-GOAL_HALF && pen.shotY<PITCH_H/2+GOAL_HALF;
  const saveRadius = 46;
  const saved = inGoal && Math.abs((pen.humanRole==='SAVE'?pen.gkRef.y:pen.gkDiveTarget) - pen.shotY) < saveRadius;
  let outcome;
  if(!inGoal) outcome='MISS';
  else if(saved) outcome='SAVE';
  else outcome='GOAL';
  if(outcome==='GOAL'){ if(pen.turn==='A') pen.scoreA++; else pen.scoreB++; AudioEngine.goal(); spawnConfetti(PITCH_W-130,pen.shotY,24); }
  else AudioEngine.miss();
  if(pen.turn==='A') pen.kicksA++; else pen.kicksB++;
  pen.resultText = outcome;
  pen.phase='RESULT'; pen.timer=1.3;
  renderBannerDOM(outcome==='GOAL'?'GOAL!':(outcome==='SAVE'?'SAVED!':'MISS!'));
  updatePenUI(match);
}
function advancePenalty(match){
  const pen = match.penalty;
  renderBannerDOM('');
  const maxA = pen.scoreA + Math.max(0,5-pen.kicksA);
  const maxB = pen.scoreB + Math.max(0,5-pen.kicksB);
  let decided=false, winnerTeam=null;
  if(pen.kicksA>=5 && pen.kicksB>=5){
    if(pen.scoreA!==pen.scoreB){ decided=true; winnerTeam = pen.scoreA>pen.scoreB?match.teamA:match.teamB; }
    else if(pen.kicksA>5 && pen.kicksA===pen.kicksB){ decided = pen.scoreA!==pen.scoreB; if(decided) winnerTeam = pen.scoreA>pen.scoreB?match.teamA:match.teamB; }
  } else {
    if(pen.scoreA>maxB){ decided=true; winnerTeam=match.teamA; }
    else if(pen.scoreB>maxA){ decided=true; winnerTeam=match.teamB; }
  }
  if(decided){
    match.ended=true; match.winner=winnerTeam;
    document.getElementById('penUI').classList.add('hidden');
    showBanner(match,'PENALTIES DECIDED',1.6,()=>{ renderBannerDOM(''); onMatchEnded(match); });
    return;
  }
  pen.turn = pen.turn==='A'?'B':'A';
  setupPenaltyKick(match);
}

/* ============================================================ RENDER MATCH FRAME ============================================================ */
function renderMatch(match){
  updateCamera(match.state==='PENALTY' ? {x:PITCH_W-160,y:PITCH_H/2} : match.ball);
  drawPitch();
  drawCrowd();
  const all = match.teamA.players.concat(match.teamB.players);
  all.sort((a,b)=>a.y-b.y);
  all.forEach(p=>drawPlayer(p, p.isHuman));
  drawBall(match.ball);
  renderParticles();
  renderRadar(match);

  document.getElementById('scoreBox').textContent = `${match.teamA.code} ${match.teamA.score} - ${match.teamB.score} ${match.teamB.code}`;
  const mm = Math.floor(match.clock/60), ss = Math.floor(match.clock%60);
  document.getElementById('clockBox').textContent = `H${match.half} ${mm}:${ss<10?'0':''}${ss}`;
  const human = match.humanTeam ? match.humanTeam.players.find(p=>p.isHuman) : null;
  if(human){
    document.getElementById('nameBox').textContent = human.name;
    document.getElementById('staminaFill').style.width = human.stamina+'%';
  }
}

/* ============================================================ SCREEN / APP STATE ============================================================ */
const screens = ['title','mode','nation','player','match','result','champion'];
function showScreen(name){
  screens.forEach(s=>document.getElementById('screen-'+s).classList.toggle('hidden', s!==name));
}

const App = {
  mode:null, // 'tournament' | 'quick'
  tournament:null,
  humanNationKey:null, humanPlayerIdx:null,
  quickOpponentKey:null,
  match:null,
  pickStage:null // for nation-select flow control
};

function startApp(){
  showScreen('title');
}
document.getElementById('screen-title').addEventListener('click',()=>{ AudioEngine.init(); goModeSelect(); });
window.addEventListener('keydown',()=>{ if(!document.getElementById('screen-title').classList.contains('hidden')){ AudioEngine.init(); goModeSelect(); } });

function goModeSelect(){ showScreen('mode'); }
document.querySelectorAll('#screen-mode .btn').forEach(btn=>{
  btn.addEventListener('click',()=>{
    App.mode = btn.getAttribute('data-mode');
    if(App.mode==='tournament'){ App.tournament = makeTournament(); App.pickStage='human'; }
    else { App.pickStage='human'; }
    document.getElementById('nationTitle').textContent = 'PICK YOUR NATION';
    populateNationGrid();
    showScreen('nation');
  });
});

function makeTournament(){
  return { round:0, roundNames:['R16','QF','SF','FINAL'], bracket: BRACKET_R16.map(m=>m.slice()), humanKey:null, results:[], eliminated:false };
}

function populateNationGrid(){
  const grid = document.getElementById('nationGrid');
  grid.innerHTML='';
  let keys = Object.keys(NATIONS);
  if(App.mode==='tournament' && App.pickStage==='human'){
    // no restriction; any of the 16
  }
  if(App.pickStage==='opponent'){
    keys = keys.filter(k=>k!==App.humanNationKey);
  }
  keys.forEach(key=>{
    const n = NATIONS[key];
    const card = document.createElement('div');
    card.className='panel nation-card';
    card.innerHTML = `<div class="kit-swatch" style="background:${n.primary};border-color:${n.secondary}"></div><div class="cname">${n.name}</div>`;
    card.addEventListener('click',()=>{
      AudioEngine.init();
      if(App.pickStage==='human'){
        App.humanNationKey = key;
        if(App.mode==='tournament'){
          App.tournament.humanKey = key;
          startTournamentRound();
        } else {
          App.pickStage='opponent';
          document.getElementById('nationTitle').textContent='PICK OPPONENT';
          populateNationGrid();
        }
      } else if(App.pickStage==='opponent'){
        App.quickOpponentKey = key;
        populatePlayerGrid();
        showScreen('player');
      }
    });
    grid.appendChild(card);
  });
}

function populatePlayerGrid(){
  const grid = document.getElementById('playerGrid');
  grid.innerHTML='';
  const n = NATIONS[App.humanNationKey];
  n.players.forEach((p,idx)=>{
    const card = document.createElement('div');
    card.className='panel player-card';
    card.style.borderColor = n.primary;
    card.innerHTML = `
      <div class="kit-swatch" style="background:${n.primary};border-color:${n.secondary}"></div>
      <div class="pname">${p.name}</div>
      <div class="ppos">${p.pos}</div>
      ${['PAC','SHO','PAS','DEF','STA'].map(s=>`
        <div class="statbar"><span class="lbl">${s}</span><div class="track"><div class="fill" style="width:${p[s]}%;background:${n.primary}"></div></div><span class="val">${p[s]}</span></div>
      `).join('')}
    `;
    card.addEventListener('click',()=>{
      AudioEngine.init();
      App.humanPlayerIdx = idx;
      beginMatchFromSelection();
    });
    grid.appendChild(card);
  });
}

function startTournamentRound(){
  const t = App.tournament;
  const roundName = t.roundNames[t.round];
  const fixture = t.bracket.find(m=>m.includes(t.humanKey));
  const oppKey = fixture[0]===t.humanKey?fixture[1]:fixture[0];
  App.quickOpponentKey = oppKey;
  populatePlayerGrid();
  showScreen('player');
}

function beginMatchFromSelection(){
  const humanKey = App.humanNationKey;
  const oppKey = App.quickOpponentKey;
  const teamA = makeTeam(humanKey,'left');
  const teamB = makeTeam(oppKey,'right');
  const starIdx = App.humanPlayerIdx;
  const realHuman = teamA.players.find(p=>p.name===NATIONS[humanKey].players[starIdx].name);
  (realHuman||teamA.players[1]).isHuman = true;
  teamA.humanPlayer = realHuman||teamA.players[1];
  let roundLabel='QUICK MATCH', aiScale=1;
  if(App.mode==='tournament'){
    roundLabel = App.tournament.roundNames[App.tournament.round];
    aiScale = ROUND_AI_SCALE[roundLabel]||1;
  }
  teamB.aiScale = aiScale;
  const match = newMatch(teamA, teamB, {isKnockout:true, roundLabel});
  App.match = match;
  showScreen('match');
  resizePitchCanvas();
  kickoff(match, Math.random()<0.5?teamA:teamB);
}

/* ============================================================ RESULT / TOURNAMENT FLOW ============================================================ */
function simulateAIMatch(keyA,keyB){
  const rA = teamRating(keyA), rB = teamRating(keyB);
  const pA = rA/(rA+rB);
  const r = Math.random();
  let winner, drawn=false;
  if(r < pA*0.9) winner=keyA;
  else if(r < pA*0.9+(1-pA)*0.9) winner=keyB;
  else { drawn=true; winner = Math.random()<pA?keyA:keyB; }
  const wg = 1+Math.floor(Math.random()*3), lg = drawn?wg:Math.floor(Math.random()*wg);
  return { winner, scoreText: drawn?`${wg}-${wg} (pens)`:`${wg}-${lg}` };
}

function onMatchEnded(match){
  document.getElementById('penUI').classList.add('hidden');
  document.getElementById('shotMeterWrap').classList.add('hidden');
  const human = match.humanTeam;
  const opp = human===match.teamA?match.teamB:match.teamA;
  const humanWon = match.winner===human;
  document.getElementById('resultTitle').textContent = App.mode==='tournament' ? (App.tournament.roundNames[App.tournament.round]+' RESULT') : 'FULL TIME';
  document.getElementById('resultStats').innerHTML = `${match.teamA.name} ${match.teamA.score} - ${match.teamB.score} ${match.teamB.name}` + (match.penalty?` <br>Penalties: ${match.penalty.scoreA} - ${match.penalty.scoreB}`:'');
  const roundListEl = document.getElementById('roundList');
  roundListEl.innerHTML='';
  const btnWrap = document.getElementById('resultButtons');
  btnWrap.innerHTML='';

  if(App.mode==='tournament'){
    const t = App.tournament;
    if(!humanWon){
      AudioEngine.miss();
      const btn = document.createElement('button'); btn.className='btn'; btn.textContent='MAIN MENU';
      btn.addEventListener('click',()=>{ resetToTitle(); });
      btnWrap.appendChild(btn);
      showScreen('result');
      return;
    }
    // simulate rest of round
    const otherFixtures = t.bracket.filter(m=>!m.includes(t.humanKey));
    const roundWinners = [t.humanKey];
    const lines = [`<b>${NATIONS[t.humanKey].code} advances (you)</b>`];
    otherFixtures.forEach(m=>{
      const res = simulateAIMatch(m[0],m[1]);
      roundWinners.push(res.winner);
      lines.push(`${NATIONS[m[0]].code} vs ${NATIONS[m[1]].code}: ${res.scoreText} — ${NATIONS[res.winner].code} through`);
    });
    roundListEl.innerHTML = lines.join('<br>');
    AudioEngine.roundUp();
    if(t.round>=3){
      // won the final
      const btn = document.createElement('button'); btn.className='btn'; btn.textContent='CLAIM TROPHY';
      btn.addEventListener('click',()=>{ showChampion(); });
      btnWrap.appendChild(btn);
    } else {
      // build next round bracket pairing in given order
      const nextBracket=[];
      for(let i=0;i<roundWinners.length;i+=2){ nextBracket.push([roundWinners[i],roundWinners[i+1]]); }
      t.bracket = nextBracket;
      t.round++;
      const btn = document.createElement('button'); btn.className='btn'; btn.textContent='NEXT ROUND';
      btn.addEventListener('click',()=>{ startTournamentRound(); });
      btnWrap.appendChild(btn);
    }
    showScreen('result');
  } else {
    const btn1 = document.createElement('button'); btn1.className='btn'; btn1.textContent='PLAY AGAIN';
    btn1.addEventListener('click',()=>{ goModeSelect(); });
    const btn2 = document.createElement('button'); btn2.className='btn secondary'; btn2.textContent='MAIN MENU';
    btn2.addEventListener('click',()=>{ resetToTitle(); });
    btnWrap.appendChild(btn1); btnWrap.appendChild(btn2);
    showScreen('result');
  }
}
function showChampion(){
  document.getElementById('champStats').innerHTML = `${NATIONS[App.humanNationKey].name} are World Champions!<br>Star: ${App.match.humanTeam.humanPlayer.name}`;
  for(let i=0;i<8;i++) setTimeout(()=>spawnConfetti(PITCH_W/2+rand(-200,200),PITCH_H/2+rand(-100,100),20),i*220);
  showScreen('champion');
}
document.getElementById('champMenuBtn').addEventListener('click',()=>resetToTitle());
function resetToTitle(){ App.mode=null; App.tournament=null; App.match=null; showScreen('title'); }

/* ============================================================ PAUSE ============================================================ */
let paused=false;
document.getElementById('pauseBtn').addEventListener('click',()=>togglePause());
document.getElementById('resumeBtn').addEventListener('click',()=>togglePause());
document.getElementById('restartBtn').addEventListener('click',()=>{
  togglePause();
  beginMatchFromSelection();
});
document.getElementById('menuBtn').addEventListener('click',()=>{ togglePause(); resetToTitle(); });
document.getElementById('muteBtn').addEventListener('click',()=>{
  AudioEngine.muted = !AudioEngine.muted;
  document.getElementById('muteBtn').textContent = AudioEngine.muted?'🔇':'🔊';
});
function togglePause(){
  paused=!paused;
  document.getElementById('pauseOverlay').classList.toggle('hidden',!paused);
}

/* ============================================================ MAIN LOOP ============================================================ */
setupInput();
window.addEventListener('resize',()=>{ if(App.match) resizePitchCanvas(); });
window.addEventListener('orientationchange',()=>{ if(App.match) resizePitchCanvas(); });

let lastTime=0, accumulator=0;
const STEP=1000/60;
function loop(now){
  requestAnimationFrame(loop);
  Input.frameReset();
  if(Input.pauseRequested && App.match && !App.match.ended) togglePause();
  if(Input.muteRequested){
    AudioEngine.muted = !AudioEngine.muted;
    document.getElementById('muteBtn').textContent = AudioEngine.muted?'🔇':'🔊';
  }
  if(!lastTime) lastTime=now;
  let delta = now-lastTime; lastTime=now;
  if(delta>250) delta=250;
  accumulator+=delta;
  while(accumulator>=STEP){
    if(App.match && !paused){
      if(App.match.state==='PENALTY') penaltyUpdate(App.match, STEP);
      else matchUpdate(App.match, STEP);
    }
    accumulator-=STEP;
  }
  if(App.match && !document.getElementById('screen-match').classList.contains('hidden')){
    renderMatch(App.match);
  }
}
requestAnimationFrame(loop);

startApp();
window.__game = App;
window.__debug = { App, Input, AudioEngine, worldToScreen, cam, viewScale: ()=>viewScale };
})();
</script>
